<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Flashcards</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<button id="reset-btn" class="floating-btn hidden">&#8635; hide all</button>

<div class="wrap">
  <header class="app-header">
    <h1>Deutsch<span>Flashcards</span></h1>
  </header>

  <div id="category-bar"></div>

  <div class="mode-row">
    <button id="quiz-toggle" class="cat-btn">&#129504; quiz mode</button>
  </div>

  <div id="deck">
    <div class="hint">click a card to hear it</div>
    <div id="grid"></div>

    <div class="nav-row">
      <button id="prev-btn">&larr; prev</button>
      <span id="progress-label"></span>
      <button id="next-btn">next &rarr;</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='words.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
